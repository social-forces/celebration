    .data(topicNodes)
    .join('g')
    .attr('class', 'bubble')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  topicCircleSel = bubbleG.append('circle')
    .attr('class', 'bg')
    .attr('r', d => d.r)
    .attr('fill', d => colorMap[d.data.topic])
    .attr('fill-opacity', 0.55);

  // Article dots (leaves) — positioned but hidden until their year arrives
  const leaves = root.leaves();
  articleSel = svg.selectAll('.article-dot')
    .data(leaves)
    .join('circle')
    .attr('class', 'article-dot')
    .attr('cx', d => d.x)
    .attr('cy', d => d.y)
    .attr('r', d => Math.max(2, d.r * 0.85))
    .attr('fill', d => d3.hsl(colorMap[d.data.topic]).darker(0.6).formatHex())
    .attr('stroke', '#fff')
    .attr('stroke-width', 0.4);

  // Topic LABELS — drawn LAST so they sit on top of the article dots
  const labelG = svg.append('g').attr('class', 'labels-top');
  labelG.selectAll('.label-group')
    .data(topicNodes)
    .join('g')
    .attr('class', 'label-group')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .each(function(d) {
      const g = d3.select(this);
      const r = d.r;
      if (r < 22) return;
      const name = d.data.topic;
      const words = name.split(/\s+/);
      const fontSize = Math.max(10, Math.min(16, r * 0.26));
      const maxChars = Math.max(6, Math.floor(r * 0.30));
      const lines = [];
      let line = '';
      words.forEach(w => {
        if (line && (line + ' ' + w).length > maxChars) {
          lines.push(line); line = w;
        } else {
          line = line ? line + ' ' + w : w;
        }
      });
      if (line) lines.push(line);
      const lineHeight = fontSize * 1.15;
      const startY = -(lines.length - 1) * lineHeight / 2;
      lines.forEach((l, i) => {
        g.append('text')
          .attr('class', 'label')
          .attr('y', startY + i * lineHeight)
          .attr('dy', '0.35em')
          .style('font-size', fontSize + 'px')
          .text(l);
      });
    });
}

// ─── Year pacing ────────────────────────────────────────────────────────
const YEARS = [2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025];
let currentYearIdx = -1;
const shownArticles = new Set();   // unique article IDs revealed so far
let yearTimer = null;
const YEAR_INTERVAL = 2800;

function showYear(yr) {
  if (!articleSel) return;
  const toShow = articleSel.filter(d => d.data.year === yr);
  // Gather nodes into an array so we can randomize the reveal order —
  // otherwise pack order shows all of one topic, then all of the next, which
  // reads as "we published a bunch about gender, then education, then..."
  const nodes = [];
  toShow.each(function(d) { nodes.push({ node: this, data: d.data }); });
  for (let i = nodes.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [nodes[i], nodes[j]] = [nodes[j], nodes[i]];
  }
  // Span the full year window so dots trickle in continuously, blurring the
  // boundary between consecutive years and making the flow feel smoother.
  const span = YEAR_INTERVAL * 0.98;
  const step = nodes.length > 0 ? Math.max(3, Math.floor(span / nodes.length)) : 0;
  nodes.forEach((n, i) => {
    setTimeout(() => {
      n.node.classList.add('visible');
      shownArticles.add(n.data.id);
      document.getElementById('art-count').textContent = shownArticles.size.toLocaleString();
    }, i * step);
  });
  document.getElementById('year-disp').textContent = yr;
}

function advanceYear() {
  if (currentYearIdx >= YEARS.length - 1) {
    stopAuto();
    window.parent.postMessage({ type: 'next-slide' }, '*');
    return;
  }
  currentYearIdx++;
  showYear(YEARS[currentYearIdx]);
}

function goBack() {
  stopAuto();
  if (currentYearIdx <= 0) {
    window.parent.postMessage({ type: 'prev-slide' }, '*');
    return;
  }
  // Reset & fast-forward to previous year
  const target = currentYearIdx - 1;
  articleSel.each(function() { this.classList.remove('visible'); });
  shownArticles.clear();
  currentYearIdx = -1;
  document.getElementById('art-count').textContent = '0';
  document.getElementById('year-disp').textContent = '\u2014';
  for (let k = 0; k <= target; k++) {
    currentYearIdx = k;
    const yr = YEARS[k];
    articleSel.filter(d => d.data.year === yr).each(function(d) {
      this.classList.add('visible');
      shownArticles.add(d.data.id);
    });
  }
  document.getElementById('art-count').textContent = shownArticles.size.toLocaleString();
  document.getElementById('year-disp').textContent = YEARS[target];
  startAuto();
}

let autoPlaying = false;
function startAuto() {
  if (autoPlaying) return;
  autoPlaying = true;
  yearTimer = setInterval(() => {
    if (currentYearIdx >= YEARS.length - 1) { stopAuto(); return; }
    advanceYear();
  }, YEAR_INTERVAL);
}
function stopAuto() {
  autoPlaying = false;
  if (yearTimer) { clearInterval(yearTimer); yearTimer = null; }
}

// ─── Init ────────────────────────────────────────────────────────────────
buildLayout();
window.addEventListener('resize', () => {
  // Remember which articles are visible, re-layout, restore visibility
  const visibleYears = new Set();
  for (let k = 0; k <= currentYearIdx; k++) visibleYears.add(YEARS[k]);
  buildLayout();
  articleSel.filter(d => visibleYears.has(d.data.year))
    .each(function() { this.classList.add('visible'); });
});

setTimeout(() => { advanceYear(); startAuto(); }, 400);

window.addEventListener('message', e => {
  if (e.data === 'advance') { stopAuto(); advanceYear(); startAuto(); }
  if (e.data === 'back') goBack();
});
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault(); stopAuto(); advanceYear(); startAuto();
  }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});
</script>
