const topics = [...new Set(DATA.map(d => d.t))].sort();
const colorMap = {};
const GOLDEN = 137.508;
const HUE_START = 15;
topics.forEach((t, i) => {
  const hue = (HUE_START + i * GOLDEN) % 360;
  colorMap[t] = d3.hcl(hue, 42, 82).formatHex();
});

const svg = d3.select('#viz');
let W, H;

let focalBubbleCenter = null;

function getSize() {
  const wrap = document.getElementById('viz-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  svg.attr('viewBox', `0 0 ${W} ${H}`).attr('width', W).attr('height', H);
}

function buildLayout() {
  migrated = false;
  getSize();

  const topicGroups = {};

  const root = d3.hierarchy({
    children: Object.entries(topicGroups).map(([topic, arts]) => ({
      topic,
      children: arts.map(a => ({
        topic, year: a.y, id: a.id, isFocal: a.f === 1, value: 1,
      })),
    })),
  })
    .sum(d => d.value)
    .sort((a, b) => b.value - a.value);

  d3.pack().size([W, H]).padding(d => d.depth === 0 ? 6 : 1.5)(root);

  const bubbleG = svg.selectAll('.bubble')
    .data(topicNodes)
    .join('g')
    .attr('class', 'bubble')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  bubbleG.append('circle')
    .attr('class', 'bg')
    .attr('r', d => d.r)
    .attr('fill', d => colorMap[d.data.topic])
    .attr('fill-opacity', 0.55);

  const focalTopicNode = topicNodes.find(n => n.data.topic === FOCAL);
  focalBubbleCenter = focalTopicNode
    ? { x: focalTopicNode.x, y: focalTopicNode.y }
    : { x: W / 2, y: H / 2 };

  // Render only the dots for Focal articles
  const focalLeaves = root.leaves().filter(l => l.data.isFocal);

  // Split into two groups: dots IN the focal bubble, and dots in OTHER bubbles
  const inFocal  = focalLeaves.filter(l => l.data.topic === FOCAL);
  const inOther  = focalLeaves.filter(l => l.data.topic !== FOCAL);

  // Use the co-topic's DARKER color for each dot, so the migration lands
  // in a rainbow of colors instead of all pink.
  function dotColor(topic) {
    return d3.hcl(colorMap[topic]).darker(1.5).formatHex();
  }

  // Focal-bubble dots — visible at start, fade out during migration
  focalDotsInFocal = svg.selectAll('.dot-focal')
    .data(inFocal)
    .join('circle')
    .attr('class', 'dot-focal')
    .attr('cx', d => d.x)
    .attr('cy', d => d.y)
    .attr('r', d => Math.max(2, d.r * 0.85))
    .attr('fill', dotColor(FOCAL))
    .attr('stroke', '#fff').attr('stroke-width', 0.4)
    .attr('opacity', 0.9);

  // Other-bubble dots — start at focal center, invisible; fly to true position
  focalDotsOther = svg.selectAll('.dot-other')
    .data(inOther)
    .join('circle')
    .attr('class', 'dot-other')
    .attr('cx', focalBubbleCenter.x)
    .attr('cy', focalBubbleCenter.y)
    .attr('r', d => Math.max(2, d.r * 0.85))
    .attr('fill', d => dotColor(d.data.topic))
    .attr('stroke', '#fff').attr('stroke-width', 0.4)
    .attr('opacity', 0);

  // Topic labels on top
  const labelG = svg.append('g').attr('class', 'labels-top');
  labelG.selectAll('.label-group')
    .data(topicNodes)
    .join('g')
    .attr('class', 'label-group')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .each(function(d) {
      const g = d3.select(this);
      const r = d.r;
      if (r < 22) return;
      const name = d.data.topic;
      const words = name.split(/\s+/);
      const fontSize = Math.max(10, Math.min(16, r * 0.26));
      const maxChars = Math.max(6, Math.floor(r * 0.30));
      const lines = [];
      let line = '';
      words.forEach(w => {
        if (line && (line + ' ' + w).length > maxChars) {
          lines.push(line); line = w;
        } else {
          line = line ? line + ' ' + w : w;
        }
      });
      if (line) lines.push(line);
      const lineHeight = fontSize * 1.15;
      const startY = -(lines.length - 1) * lineHeight / 2;
      lines.forEach((l, i) => {
        g.append('text')
          .attr('class', 'label')
          .attr('y', startY + i * lineHeight)
          .attr('dy', '0.35em')
          .style('font-size', fontSize + 'px')
          .text(l);
      });
    });

  document.getElementById('focal-total').textContent = inFocal.length.toLocaleString();
}

function migrate() {
  if (migrated || !focalDotsOther) return;
  migrated = true;

  // Fly out: other-topic dots travel from focal center to their true positions
  focalDotsOther
    .transition()
    .delay((d, i) => Math.random() * 700)
    .duration(1400)
    .ease(d3.easeCubicInOut)
    .attr('cx', d => d.x)
    .attr('cy', d => d.y)
    .attr('opacity', 0.9);

  // Focal-bubble dots fade out slightly later
  focalDotsInFocal
    .transition()
    .delay((d, i) => 500 + Math.random() * 600)
    .duration(900)
    .attr('opacity', 0);
}

function reset() {
  if (!focalDotsOther) return;
  focalDotsOther.interrupt()
    .attr('cx', focalBubbleCenter.x)
    .attr('cy', focalBubbleCenter.y)
    .attr('opacity', 0);
  focalDotsInFocal.interrupt().attr('opacity', 0.9);
  migrated = false;
}

buildLayout();
window.addEventListener('resize', () => {
  const wasMigrated = migrated;
  buildLayout();
  if (wasMigrated) migrate();
});

// First advance -> migrate; second advance -> next slide. Back -> reset or prev.
function handleAdvance() {
  if (!migrated) migrate();
  else window.parent.postMessage({ type: 'next-slide' }, '*');
}
function handleBack() {
  if (migrated) reset();
  else window.parent.postMessage({ type: 'prev-slide' }, '*');
}

// Auto-trigger migration shortly after arriving, so even without a click
// the viewer sees the whole thing.
setTimeout(() => { if (!migrated) migrate(); }, 1800);

window.addEventListener('message', e => {
  if (e.data === 'advance') handleAdvance();
  if (e.data === 'back')    handleBack();
});
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); handleAdvance(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); handleBack(); }
});
</script>
</body>
</html>
