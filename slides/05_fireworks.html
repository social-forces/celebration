    transform: translate(-50%, -50%) scale(0.6);

  }
  .floating-label .title {
    font-size: 17px;
    font-weight: 500;
    font-style: italic;
    color: #fff9e6;
    line-height: 1.3;
  }
  .floating-label .author {
    font-size: 14px;
    margin-top: 5px;
    font-weight: 400;
    /* color set inline from the shell's palette */
  }
  @keyframes float-up {
    0%   { opacity: 0; transform: translate(-50%, -40%) scale(0.6); }
    12%  { opacity: 1; transform: translate(-50%, -60%) scale(1); }
    80%  { opacity: 1; transform: translate(-50%, -150%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -190%) scale(1); }
  }

const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Firework palette (saturated, glowy)
const PALETTE = [
  '#ff6b6b', '#ffd85a', '#ffa94d', '#ff8ac1',
  '#4dd0e1', '#74f0a6', '#b388ff', '#ffffff',
  '#9be15d', '#f06292',
];
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Particle pools
let shells = [];   // rising launches
let sparks = [];   // exploded particles

// Firework "style" buckets — give each shell its own personality
const STYLES = ['peony', 'chrysanthemum', 'ring', 'willow', 'crossette', 'palm'];

function chooseStyle(cites) {
  if (cites <= 2)   return 'fizzle';   // 0–2 cites: barely pops
  if (cites >= 300) return pick(['chrysanthemum', 'willow', 'crossette', 'ring', 'peony']);
  if (cites >= 50)  return pick(['peony', 'chrysanthemum', 'ring', 'palm']);
  if (cites >= 10)  return pick(['peony', 'peony', 'ring', 'chrysanthemum']);
  return 'peony';
}

function launchShell(cites, opts = {}) {
  const startX = W * (0.08 + Math.random() * 0.84);
  const startY = H + 10;
  // Burst altitude now depends STEEPLY on cites:
  //   0 cites  -> ~80% down (low, near bottom)
  //   10 cites -> ~55% down (mid)
  //   100      -> ~30% down
  //   880      -> ~12% down (sky-high)
  const magnitude = Math.log10(cites + 2);                       // 0.3..~2.95
  const heightBase = Math.max(0.10, 0.88 - magnitude * 0.26);
  const jitter = (Math.random() - 0.5) * 0.08;                   // small jitter only
  const burstY = H * Math.max(0.08, Math.min(0.85, heightBase + jitter));
  const vx = (Math.random() - 0.5) * 1.4;
  const vy = -(Math.sqrt(2 * 0.18 * (startY - burstY)));
  const color = pick(PALETTE);
  shells.push({
    x: startX, y: startY, vx, vy,
    burstY, color, cites,
    trail: [],
    labelKey: opts.labelKey || null,
    style: chooseStyle(cites),
  });
}

function addSpark(x, y, vx, vy, color, opts = {}) {
  sparks.push({
    x, y, vx, vy,
    life: opts.life || 1.0,
    decay: opts.decay || (0.009 + Math.random() * 0.014),
    color,
    size: opts.size || (1.4 + Math.random() * 1.6),
    isFlash: false,
    trailed: !!opts.trailed,
    trailFade: opts.trailFade || 0,
    gravity: opts.gravity == null ? 0.05 : opts.gravity,
    drag: opts.drag == null ? 0.985 : opts.drag,
    crackle: opts.crackle || 0,
  });
}

function burst(shell) {
  const cites = shell.cites;
  const hue = shell.color;
  const hue2 = Math.random() < 0.45 ? pick(PALETTE) : hue;
  const mag = Math.log2(cites + 1);                     // 0..~9.8
  const baseN = Math.round(14 + mag * 10);              // 14..120
  const baseSpd = 2.2 + Math.min(5, mag * 0.5);         // 2..7

  // Bright flash
  sparks.push({
    x: shell.x, y: shell.y, vx: 0, vy: 0,
    life: 1.0, decay: 0.05, color: '#ffffff',
    size: 6 + mag * 1.8, isFlash: true,
  });

  const style = shell.style;

  if (style === 'fizzle') {
    // Dud: tiny weak pop, dim color, few sparks, quick fade — no flash
    sparks.pop(); // remove the bright flash we just added
    const n = 3 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 0.8 + Math.random() * 1.0;
      addSpark(shell.x, shell.y,
        Math.cos(ang) * spd, Math.sin(ang) * spd,
        'rgba(200,200,200,0.85)',
        { decay: 0.04 + Math.random() * 0.03, size: 1.0 + Math.random() * 0.6,
          gravity: 0.08 });
    }
    return;
  }

  if (style === 'ring') {
    // Perfect circle of sparks, no jitter — very distinct look
    const n = baseN;
    const spd = baseSpd * 1.1;
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * Math.PI * 2;
      addSpark(shell.x, shell.y,
        Math.cos(ang) * spd, Math.sin(ang) * spd,
        hue, { size: 2.0 + Math.random() * 0.8 });
    }
  } else if (style === 'chrysanthemum') {
    // Sparks with glowing trails that linger
    const n = Math.round(baseN * 1.2);
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = baseSpd * (0.7 + Math.random() * 0.7);
      addSpark(shell.x, shell.y,
        Math.cos(ang) * spd, Math.sin(ang) * spd,
        Math.random() < 0.5 ? hue : hue2,
        { trailed: true, trailFade: 0.6, decay: 0.006 + Math.random() * 0.008,
          size: 1.8 + Math.random() * 1.2 });
    }

    const n = Math.round(baseN * 0.9);
    const spd = baseSpd * 0.55;
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      addSpark(shell.x, shell.y,
        Math.cos(ang) * spd * (0.6 + Math.random() * 0.5),
        Math.sin(ang) * spd * (0.6 + Math.random() * 0.5),
        hue,
        { trailed: true, trailFade: 0.8, decay: 0.004 + Math.random() * 0.005,
          gravity: 0.11, drag: 0.99, size: 1.4 + Math.random() * 0.8 });
    }
  } else if (style === 'crossette') {
    // Initial burst, each spark re-explodes (we fake it with a "crackle" timer)
    const n = Math.round(baseN * 0.6);
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = baseSpd * (0.9 + Math.random() * 0.4);
      addSpark(shell.x, shell.y,
        Math.cos(ang) * spd, Math.sin(ang) * spd,
        Math.random() < 0.5 ? hue : hue2,
        { crackle: 0.35 + Math.random() * 0.2,   // trigger re-explosion at this life
          size: 2.0 + Math.random() * 0.8,
          decay: 0.010 });
    }
  } else if (style === 'palm') {
    // Tall, narrow — sparks go mostly UP and then fall as fronds
    const n = Math.round(baseN * 0.7);
    for (let i = 0; i < n; i++) {
      // Biased toward upward angles (270° ± 70°)
      const ang = -Math.PI / 2 + (Math.random() - 0.5) * 1.6;
      const spd = baseSpd * (0.9 + Math.random() * 0.8);
      addSpark(shell.x, shell.y,
        Math.cos(ang) * spd, Math.sin(ang) * spd,
        hue,
        { trailed: true, trailFade: 0.7, gravity: 0.09,
          decay: 0.005, size: 1.8 + Math.random() * 1.0 });
    }
  } else {
    // peony: classic round burst, randomized
    const n = baseN;
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = baseSpd * (0.55 + Math.random() * 0.9);
      addSpark(shell.x, shell.y,
        Math.cos(ang) * spd, Math.sin(ang) * spd,
        Math.random() < 0.5 ? hue : hue2,
        { size: 1.6 + Math.random() * 1.6 });
    }
  }

  // Double burst for huge papers (300+ cites): schedule a second pop
  if (cites >= 300) {
    setTimeout(() => {
      const miniShell = {
        x: shell.x + (Math.random() - 0.5) * 60,
        y: shell.y + (Math.random() - 0.5) * 60,
        cites: Math.floor(cites * 0.35), color: pick(PALETTE),
        style: pick(['ring', 'chrysanthemum', 'peony']),
      };
      burst(miniShell);
    }, 180 + Math.random() * 180);
  }

  if (shell.labelKey && labelLookup[shell.labelKey]) {
    showLabel(labelLookup[shell.labelKey], shell.x, shell.y, shell.color);
  }
}

function showLabel(l, burstX, burstY, color) {
  const container = document.getElementById('floating-labels');
  // Anchor the label a bit below the burst so the rise animation reads
  // as "emerging from the explosion". Clamp to keep the box on-screen.
  const anchorX = Math.max(230, Math.min(W - 230, burstX));
  const anchorY = Math.max(90, Math.min(H - 40, burstY + 24));

  const el = document.createElement('div');
  el.className = 'floating-label';
  el.style.left = anchorX + 'px';
  el.style.top = anchorY + 'px';

  const titleEl = document.createElement('div');
  titleEl.className = 'title';
  titleEl.textContent = '\u201C' + l.title + '\u201D';

  const authorEl = document.createElement('div');
  authorEl.className = 'author';
  authorEl.textContent = l.author;
  authorEl.style.color = color;

  el.appendChild(titleEl);
  el.appendChild(authorEl);
  container.appendChild(el);

  el.addEventListener('animationend', () => el.remove());
}

// ---------------------------------------------------------------------------
let paperCount = 0;
let citeCount = 0;
function updateCounts() {
  document.getElementById('cite-count').textContent = citeCount.toLocaleString();
}

// Animate
function animate() {
  // Motion-blur trail effect: translucent dark overlay each frame
  ctx.fillStyle = 'rgba(11, 24, 48, 0.22)';
  ctx.fillRect(0, 0, W, H);

  // Update shells
  const liveShells = [];
  for (const s of shells) {
    s.vy += 0.06;     // slight gravity while ascending
    s.x += s.vx;
    s.y += s.vy;
    s.trail.push({ x: s.x, y: s.y });
    if (s.trail.length > 8) s.trail.shift();
    // Draw trail
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < s.trail.length; i++) {
      const p = s.trail[i];
      if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    // Shell dot
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 2.4, 0, Math.PI * 2);
    ctx.fill();

    if (s.y <= s.burstY || s.vy >= 0) {
      burst(s);
      paperCount++;
      citeCount += s.cites;
      updateCounts();
    } else {
      liveShells.push(s);
    }
  }
  shells = liveShells;

  // Update sparks
  const liveSparks = [];
  const crackleQueue = [];
  for (const p of sparks) {
    if (!p.isFlash) {
      p.vy += p.gravity != null ? p.gravity : 0.05;
      const d = p.drag != null ? p.drag : 0.985;
      p.vx *= d;
      p.vy *= d;
      p.x += p.vx;
      p.y += p.vy;
    }
    p.life -= p.decay;
    if (p.life <= 0) continue;
    // Crossette re-explosion
    if (p.crackle && p.life <= p.crackle) {
      crackleQueue.push(p);
      continue;
    }
    // Trailing: draw a faint copy before updating (ghost trail)
    if (p.trailed) {
      ctx.globalAlpha = Math.max(0, p.life * (p.trailFade || 0.5));
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x - p.vx * 0.9, p.y - p.vy * 0.9, p.size * 0.85, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    if (p.isFlash) {
      const r = p.size * (1 + (1 - p.life) * 1.5);
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
      grad.addColorStop(0, 'rgba(255,255,255,' + p.life + ')');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    liveSparks.push(p);
  }
  // Crossette: each crackling spark bursts into mini-sparks
  for (const p of crackleQueue) {
    for (let i = 0; i < 8; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 1.6 + Math.random() * 1.2;
      addSpark(p.x, p.y,
        Math.cos(ang) * spd + p.vx * 0.2,
        Math.sin(ang) * spd + p.vy * 0.2,
        p.color,
        { decay: 0.03 + Math.random() * 0.02, size: 1.2 });
    }
  }
  sparks = liveSparks;
  ctx.globalAlpha = 1;

  requestAnimationFrame(animate);
}
animate();

// ---------------------------------------------------------------------------
// Year-by-year launch scheduling
const YEAR_DURATION = 3500;        // ms spent on each year
let currentYearIdx = -1;
let yearTimer = null;
let launchTimer = null;

function launchForYear(yr) {
  document.getElementById('year-display').textContent = yr;
  const cites = papersByYear[yr] || [];
  if (cites.length === 0) return;
  // Spread launches across ~85% of the year window
  const windowMs = YEAR_DURATION * 0.85;
  const interval = Math.max(10, Math.floor(windowMs / cites.length));
  let i = 0;
  if (launchTimer) clearInterval(launchTimer);
  launchTimer = setInterval(() => {
    if (i >= cites.length) { clearInterval(launchTimer); launchTimer = null; return; }
    const c = cites[i];
    const key = yr + ':' + c;
    launchShell(c, { labelKey: labelLookup[key] ? key : null });
    i++;
  }, interval);
}

function advanceYear() {
  currentYearIdx++;
  if (currentYearIdx >= YEARS.length) {
    stopAuto();
    // Finale: stay on last year, show totals
    document.getElementById('year-display').textContent = '2010\u20132025';
    return;
  }
  launchForYear(YEARS[currentYearIdx]);
}

let autoPlaying = false;
function startAuto() {
  if (autoPlaying) return;
  autoPlaying = true;
  yearTimer = setInterval(() => {
    if (currentYearIdx >= YEARS.length - 1) {
      stopAuto();
      window.parent.postMessage({ type: 'next-slide' }, '*');
      return;
    }
    advanceYear();
  }, YEAR_DURATION);
}
function stopAuto() {
  autoPlaying = false;
  if (yearTimer) { clearInterval(yearTimer); yearTimer = null; }
}

function goBack() {
  stopAuto();
  if (currentYearIdx <= 0) {
    window.parent.postMessage({ type: 'prev-slide' }, '*');
    return;
  }
  // Full reset
  currentYearIdx = -1;
  paperCount = 0;
  citeCount = 0;
  shells = [];
  sparks = [];
  updateCounts();
  advanceYear();
  startAuto();
}

window.addEventListener('load', () => {
  setTimeout(() => { advanceYear(); startAuto(); }, 400);
});

window.addEventListener('message', e => {
  if (e.data === 'advance') { stopAuto(); advanceYear(); startAuto(); }
  if (e.data === 'back') goBack();
});
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault(); stopAuto(); advanceYear(); startAuto();
  }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});
</script>
