<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Social Forces — By the Numbers</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; overflow: hidden; }
  iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    border: none;
    /* Promote to its own compositor layer so canvas pixels go
       straight to GPU instead of round-tripping through the parent
       document's paint path. This is what was halving frame rate. */
    transform: translateZ(0);
    will-change: transform;
  }
</style>
</head>
<body>

<iframe id="slide" src=""></iframe>

<script>
const slides = [
  // title
  'slides/00_title.html',
  // Part One: The Scale
  'slides/section_01_scale.html',
  'slides/08_submissions.html',
  // Part Two: Around the World
  'slides/section_02_world.html',
  'slides/02_stack_arne.html',
  // Part Three: Behind the Reviews
  'slides/section_03_reviews.html',
  'slides/04_catapult.html',
  // Part Four: What We Published
  'slides/section_04_published.html',
  'slides/06_topics.html',
  'slides/07_topic_detail.html',
  // Part Five: Lasting Impact
  'slides/section_05_impact.html',
  'slides/05_fireworks.html',
];

let current = 0;
const iframe = document.getElementById('slide');

function loadSlide(index) {
  current = Math.max(0, Math.min(index, slides.length - 1));
  iframe.src = slides[current];
}

function sendToSlide(msg) {
  iframe.contentWindow.postMessage(msg, '*');
}

// Listen for slides requesting next/prev
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'next-slide') {
    if (current < slides.length - 1) {
      loadSlide(current + 1);
    }
  }
  if (e.data && e.data.type === 'prev-slide') {
    if (current > 0) {
      loadSlide(current - 1);
    }
  }
});

function isForceNextKey(e) {
  return e.key === 'n' || e.key === 'N' || e.key === 'PageDown';
}
function isForcePrevKey(e) {
  return e.key === 'b' || e.key === 'B' || e.key === 'PageUp';
}
function forceNext() {
  if (current < slides.length - 1) loadSlide(current + 1);
}
function forcePrev() {
  if (current > 0) loadSlide(current - 1);
}

// Parent-level keys (fires when focus isn't in the iframe)
document.addEventListener('keydown', e => {
  if (isForceNextKey(e)) { e.preventDefault(); forceNext(); return; }
  if (isForcePrevKey(e)) { e.preventDefault(); forcePrev(); return; }
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault(); sendToSlide('advance');
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault(); sendToSlide('back');
  }
});

// Inject force-next/back listeners into each slide so the keys work even
// when the iframe has focus (which is most of the time).
iframe.addEventListener('load', () => {
  try {
    const w = iframe.contentWindow;
    w.addEventListener('keydown', e => {
      if (isForceNextKey(e)) { e.preventDefault(); forceNext(); }
      if (isForcePrevKey(e)) { e.preventDefault(); forcePrev(); }
    });
  } catch (err) { /* cross-origin safety, shouldn't happen here */ }
});

// Start
loadSlide(0);
</script>
</body>
</html>
